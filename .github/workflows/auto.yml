name: 构建

on:
  push:
    branches: [ 'main' ]
    paths: [ 'version.txt' ]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（留空则自动从version.txt读取）'
        required: false
        type: string
        default: ''
      skip_frontend_build:
        description: '跳过前端构建'
        required: false
        type: boolean
        default: false
      force_release:
        description: '强制创建Release（即使版本号包含dev/pre/beta）'
        required: false
        type: boolean
        default: false

env:
  APP_NAME: taoSync

jobs:
  get-version:
    name: 获取版本号
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.getVersion.outputs.VERSION }}
      SKIP_FRONTEND: ${{ steps.getVersion.outputs.SKIP_FRONTEND }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - id: getVersion
        name: 获取版本号
        run: |
          # 处理手动输入的版本号
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            echo "✅ 使用手动输入的版本号: $VERSION"
          else
            # 从 version.txt 读取
            versions=$(head -n 1 version.txt | tr -d '\r\n')
            if [ -z "$versions" ]; then
              echo "❌ Error: version.txt is empty"
              exit 1
            fi
            IFS=',' read -ra versionList <<< "$versions"
            VERSION="${versionList[0]}"
            echo "✅ 使用文件中的版本号: $VERSION"
          fi
          
          # 处理跳过前端构建的选项
          SKIP_FRONTEND="false"
          if [ "${{ inputs.skip_frontend_build }}" = "true" ]; then
            SKIP_FRONTEND="true"
            echo "⚠️ 将跳过前端构建（使用已存在的前端产物）"
          fi
          
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "SKIP_FRONTEND=$SKIP_FRONTEND" >> "$GITHUB_OUTPUT"

  build-frontend:
    name: 构建前端
    runs-on: ubuntu-latest
    needs: [ get-version ]
    if: ${{ needs.get-version.outputs.SKIP_FRONTEND != 'true' }}
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      # 升级 Node.js 版本到 18 或 20（Node 14 也已过时）
      - name: 安装Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"  # 从 14.x 升级到 20.x

      - name: 缓存Node.js模块
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: 安装依赖并构建前端
        run: |
          sed -i "s/__version_placeholder__/$VERSION/g" frontend/src/views/page/setting/index.vue
          cd frontend
          npm install
          npm run build

      - name: 上传artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  build-linux:
    name: 构建Linux
    runs-on: ubuntu-latest
    needs: [ get-version, build-frontend ]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/loong64

    steps:
      - name: 替换平台名称中的斜杠为横杠
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: 设置QEMU
        uses: docker/setup-qemu-action@v3

      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 下载前端
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 缓存pip包
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'pyinstaller>=6,<7'
          python -m pip install -r requirements.txt

      - name: 构建可执行文件
        run: |
          python -m PyInstaller ${{ env.APP_NAME }}.spec

      - name: 打包可执行文件
        run: |
          cd dist
          tar czf "${{ env.APP_NAME }}-${{ env.VERSION }}-${{ env.PLATFORM_PAIR }}.tar.gz" ${{ env.APP_NAME }}

      - name: 上传artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux-${{ env.PLATFORM_PAIR }}
          path: dist/*.tar.gz
          retention-days: 1

  build-windows:
    name: 构建Windows
    runs-on: windows-latest
    needs: [get-version, build-frontend]
    env:
      VERSION: ${{needs.get-version.outputs.VERSION}}
    if: ${{ !contains(needs.get-version.outputs.VERSION, 'dev') }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 下载前端
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 缓存pip包
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 安装依赖并构建打包
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'pyinstaller>=6,<7'
          python -m pip install -r requirements.txt
          python -m PyInstaller ${{ env.APP_NAME }}.spec
          cd dist
          7z a ${{ env.APP_NAME }}-${{ env.VERSION }}-windows-amd64.zip *

      - name: 上传artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows-amd64
          path: dist/*.zip
          retention-days: 1

  create-release:
    name: 发布release
    runs-on: ubuntu-latest
    needs: [get-version, build-windows, build-linux]
    env:
      VERSION: ${{needs.get-version.outputs.VERSION}}
    if: ${{ !contains(needs.get-version.outputs.VERSION, 'dev') || inputs.force_release == 'true' }}
    permissions:
      contents: write  # 关键：授予写入权限
      issues: write    # 可选：如果需要操作 issues
      pull-requests: write  # 可选：如果需要操作 PR
    
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 下载构建结果
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: 没有版本日志文件自动创建
        run: |
          version_first=$(echo $VERSION | cut -d'-' -f1)
          LOG_FILE="doc/changelog/$version_first.md"
          if [ ! -f "$LOG_FILE" ]; then
            mkdir -p doc/changelog
            touch "$LOG_FILE"
            echo "$VERSION" > "$LOG_FILE"
          fi
          echo "LOG_FILE=$LOG_FILE" >> "$GITHUB_ENV"

      # 方案1：使用最新版本的 softprops/action-gh-release
      - name: 创建release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: dist/*
          body_path: ${{ env.LOG_FILE }}
          prerelease: ${{ contains(env.VERSION, 'dev') || contains(env.VERSION, 'pre') || contains(env.VERSION, 'beta') }}
          generate_release_notes: false  # 是否自动生成 release notes
          draft: false  # 是否为草稿
          # 如果还是权限问题，可以尝试使用 GITHUB_TOKEN 明确指定
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
