name: 构建

on:
  push:
    branches: [ 'main' ]
    paths: [ 'version.txt' ]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（留空则自动从version.txt读取）'
        required: false
        type: string
        default: ''
      skip_frontend_build:
        description: '跳过前端构建'
        required: false
        type: boolean
        default: false
      force_release:
        description: '强制创建Release（即使版本号包含dev/pre/beta）'
        required: false
        type: boolean
        default: false

env:
  APP_NAME: taoSync
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  get-version:
    name: 获取版本号
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.getVersion.outputs.VERSION }}
      SKIP_FRONTEND: ${{ steps.getVersion.outputs.SKIP_FRONTEND }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - id: getVersion
        name: 获取版本号
        run: |
          # 处理手动输入的版本号
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            echo "✅ 使用手动输入的版本号: $VERSION"
          else
            # 从 version.txt 读取
            versions=$(head -n 1 version.txt | tr -d '\r\n')
            if [ -z "$versions" ]; then
              echo "❌ Error: version.txt is empty"
              exit 1
            fi
            IFS=',' read -ra versionList <<< "$versions"
            VERSION="${versionList[0]}"
            echo "✅ 使用文件中的版本号: $VERSION"
          fi
          
          # 处理跳过前端构建的选项
          SKIP_FRONTEND="false"
          if [ "${{ inputs.skip_frontend_build }}" = "true" ]; then
            SKIP_FRONTEND="true"
            echo "⚠️ 将跳过前端构建（使用已存在的前端产物）"
          fi
          
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "SKIP_FRONTEND=$SKIP_FRONTEND" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION"
          echo "SKIP_FRONTEND=$SKIP_FRONTEND"

  build-frontend:
    name: 构建前端
    runs-on: ubuntu-latest
    needs: [ get-version ]
    if: ${{ needs.get-version.outputs.SKIP_FRONTEND != 'true' }}
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: 缓存Node.js模块
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: 安装依赖并构建前端
        run: |
          # 检查 version 占位符文件是否存在
          if [ -f "frontend/src/views/page/setting/index.vue" ]; then
            sed -i "s/__version_placeholder__/$VERSION/g" frontend/src/views/page/setting/index.vue
          else
            echo "⚠️ 警告: version 占位符文件不存在，跳过替换"
          fi
          cd frontend
          npm install
          npm run build

      - name: 上传artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1
          if-no-files-found: warn

  # 龙芯新世界架构构建（使用 QEMU 模拟）
  build-loongarch64-newworld:
    name: 构建龙芯新世界 (loongarch64)
    runs-on: ubuntu-latest
    needs: [ get-version, build-frontend ]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 下载前端
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: 设置QEMU用户态模拟
        uses: docker/setup-qemu-action@v3

      - name: 安装QEMU loongarch64支持
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support

      - name: 注册loongarch64 binfmt
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: 使用容器构建loongarch64新世界
        run: |
          # 创建构建脚本
          cat > build.sh << 'EOF'
          #!/bin/bash
          set -e
          
          echo "开始构建 loongarch64 新世界版本..."
          
          # 更新并安装依赖
          apt-get update
          apt-get install -y python3 python3-pip
          
          pip3 install --upgrade pip
          pip3 install 'pyinstaller>=6,<7'
          pip3 install -r requirements.txt
          
          # 构建
          python3 -m PyInstaller taoSync.spec
          
          # 检查产物
          if [ ! -f "dist/taoSync" ]; then
            echo "构建失败：未找到可执行文件"
            exit 1
          fi
          
          echo "构建成功"
          file dist/taoSync
          EOF
          
          chmod +x build.sh
          
          # 使用 loongarch64 架构容器运行
          docker run --rm \
            --platform linux/loong64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            loongarch64/debian:buster-slim \
            /bin/bash -c "apt-get update && apt-get install -y file && bash /workspace/build.sh"
          
          # 打包
          cd dist
          tar czf "${{ env.APP_NAME }}-${{ env.VERSION }}-linux-loongarch64-newworld.tar.gz" ${{ env.APP_NAME }}

      - name: 上传artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-loongarch64-newworld
          path: dist/*.tar.gz
          retention-days: 1
          if-no-files-found: error

  # 龙芯旧世界架构构建（使用 QEMU 模拟 + 旧世界标志）
  build-loongarch64-oldworld:
    name: 构建龙芯旧世界 (loongarch64)
    runs-on: ubuntu-latest
    needs: [ get-version, build-frontend ]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 下载前端
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: 设置QEMU用户态模拟
        uses: docker/setup-qemu-action@v3

      - name: 安装QEMU loongarch64支持
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support

      - name: 注册loongarch64 binfmt
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: 使用容器构建loongarch64旧世界
        run: |
          # 创建构建脚本
          cat > build-oldworld.sh << 'EOF'
          #!/bin/bash
          set -e
          
          echo "开始构建 loongarch64 旧世界版本..."
          
          # 更新并安装依赖（使用旧世界兼容的源）
          apt-get update
          apt-get install -y python3 python3-pip gcc g++
          
          # 设置旧世界编译标志
          export CFLAGS="-mabi=lp64d -mold-world"
          export CXXFLAGS="-mabi=lp64d -mold-world"
          export LDFLAGS="-mabi=lp64d -mold-world"
          
          pip3 install --upgrade pip
          pip3 install 'pyinstaller>=6,<7'
          pip3 install -r requirements.txt
          
          # 构建
          python3 -m PyInstaller taoSync.spec
          
          # 检查产物
          if [ ! -f "dist/taoSync" ]; then
            echo "构建失败：未找到可执行文件"
            exit 1
          fi
          
          echo "构建成功"
          file dist/taoSync
          EOF
          
          chmod +x build-oldworld.sh
          
          # 使用 loongarch64 架构容器运行
          docker run --rm \
            --platform linux/loong64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            loongarch64/debian:buster-slim \
            /bin/bash -c "apt-get update && apt-get install -y file gcc g++ && bash /workspace/build-oldworld.sh"
          
          # 打包
          cd dist
          tar czf "${{ env.APP_NAME }}-${{ env.VERSION }}-linux-loongarch64-oldworld.tar.gz" ${{ env.APP_NAME }}

      - name: 上传artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-loongarch64-oldworld
          path: dist/*.tar.gz
          retention-days: 1
          if-no-files-found: error

  # 使用自托管运行器构建旧世界（备选方案，更可靠）
  build-loongarch64-oldworld-native:
    name: 构建龙芯旧世界（原生环境）
    runs-on: [self-hosted, loongarch64, oldworld]
    needs: [ get-version, build-frontend ]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
    if: false  # 默认禁用，需要自托管运行器时改为 true

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 下载前端
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: 安装依赖
        run: |
          pip3 install --upgrade pip
          pip3 install 'pyinstaller>=6,<7'
          pip3 install -r requirements.txt

      - name: 构建
        run: |
          python3 -m PyInstaller ${{ env.APP_NAME }}.spec

      - name: 打包
        run: |
          cd dist
          tar czf "${{ env.APP_NAME }}-${{ env.VERSION }}-linux-loongarch64-oldworld.tar.gz" ${{ env.APP_NAME }}

      - name: 上传artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-loongarch64-oldworld-native
          path: dist/*.tar.gz
          retention-days: 1

  create-release:
    name: 发布release
    runs-on: ubuntu-latest
    needs: [get-version, build-loongarch64-newworld, build-loongarch64-oldworld]
    env:
      VERSION: ${{needs.get-version.outputs.VERSION}}
    if: ${{ !contains(needs.get-version.outputs.VERSION, 'dev') || inputs.force_release == 'true' }}
    permissions:
      contents: write
    
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 下载构建结果
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: 列出下载的文件
        run: |
          echo "下载的文件列表："
          ls -la dist/ || echo "dist 目录为空"

      - name: 重命名文件使名称更清晰
        run: |
          cd dist
          # 统一命名格式
          for file in *.tar.gz; do
            echo "找到文件: $file"
          done

      - name: 创建版本日志文件
        run: |
          version_first=$(echo $VERSION | cut -d'-' -f1)
          LOG_FILE="doc/changelog/$version_first.md"
          if [ ! -f "$LOG_FILE" ]; then
            mkdir -p doc/changelog
            echo "# $VERSION" > "$LOG_FILE"
            echo "" >> "$LOG_FILE"
            echo "## 更新内容" >> "$LOG_FILE"
            echo "" >> "$LOG_FILE"
            echo "- 待补充" >> "$LOG_FILE"
          fi
          echo "LOG_FILE=$LOG_FILE" >> "$GITHUB_ENV"

      - name: 创建release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: dist/*.tar.gz
          body_path: ${{ env.LOG_FILE }}
          prerelease: ${{ contains(env.VERSION, 'dev') || contains(env.VERSION, 'pre') || contains(env.VERSION, 'beta') }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
