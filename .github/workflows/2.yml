name: 构建

on:
  push:
    branches: [ 'main' ]
    paths: [ 'version.txt' ]

env:
  APP_NAME: taoSync
  DOCKER_USER: dr34m
  DOCKER_NAME: tao-sync

jobs:
  get-version:
    name: 获取版本号
    runs-on: ubuntu-latest
    outputs:
      TAG_LIST: ${{ steps.getVersion.outputs.TAG_LIST }}
      VERSION: ${{ steps.getVersion.outputs.VERSION }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - id: getVersion
        name: 获取版本号
        run: |
          versions=$(head -n 1 version.txt)
          tagList=""
          IFS=',' read -ra versionList <<< "$versions"
          cuVersion="${versionList[0]}"
          for version in "${versionList[@]}"; do
            tagList+="-t $DOCKER_USER/$DOCKER_NAME:$version "
          done
          echo "TAG_LIST=$tagList" >> "$GITHUB_OUTPUT"
          echo "VERSION=$cuVersion" >> "$GITHUB_OUTPUT"

  build-frontend:
    name: 构建前端
    runs-on: ubuntu-latest
    needs: [ get-version ]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装Node.js 14.x
        uses: actions/setup-node@v4
        with:
          node-version: "14.x"

      - name: 安装依赖并构建前端
        run: |
          sed -i "s/__version_placeholder__/$VERSION/g" frontend/src/views/page/setting/index.vue
          cd frontend
          npm install
          npm run build

      - name: 上传artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  build-loongson:
    name: 构建龙芯可执行文件
    runs-on: ubuntu-latest
    needs: [ get-version, build-frontend ]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
    strategy:
      matrix:
        arch:
          - loong64        # 龙芯新世界：LoongArch64
          - mips64le       # 龙芯旧世界：MIPS64 小端

    steps:
      - name: 设置平台变量
        run: |
          arch=${{ matrix.arch }}
          if [ "$arch" = "loong64" ]; then
            echo "ARCH_NAME=loongson-newworld" >> $GITHUB_ENV
            echo "DEBIAN_ARCH=loongarch64" >> $GITHUB_ENV
          else
            echo "ARCH_NAME=loongson-oldworld" >> $GITHUB_ENV
            echo "DEBIAN_ARCH=mips64el" >> $GITHUB_ENV
          fi

      - name: 设置QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/${{ matrix.arch }}

      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 下载前端构建产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: 创建构建容器并执行打包
        run: |
          # 根据架构选择基础镜像（需确保镜像支持目标架构）
          if [ "${{ matrix.arch }}" = "loong64" ]; then
            BASE_IMAGE="loongson/ubuntu:22.04"
          else
            BASE_IMAGE="debian:bullseye"
          fi
          
          # 启动容器并执行构建
          docker run --rm --platform linux/${{ matrix.arch }} \
            -v $(pwd):/workspace \
            -w /workspace \
            $BASE_IMAGE bash -c "
              apt-get update && apt-get install -y python3 python3-pip python3-venv build-essential
              python3 -m venv /opt/venv
              source /opt/venv/bin/activate
              pip install 'pyinstaller>=6,<7'
              pip install -r requirements.txt
              python3 -m PyInstaller ${{ env.APP_NAME }}.spec
              cd dist
              tar czf '${{ env.APP_NAME }}-${{ env.VERSION }}-${{ env.ARCH_NAME }}.tar.gz' *
            "

      - name: 上传龙芯构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ env.ARCH_NAME }}
          path: ${{ env.APP_NAME }}-${{ env.VERSION }}-${{ env.ARCH_NAME }}.tar.gz
          retention-days: 1

  create-release:
    name: 发布release
    runs-on: ubuntu-latest
    needs: [get-version, build-loongson]
    env:
      VERSION: ${{needs.get-version.outputs.VERSION}}
    if: ${{ !contains(needs.get-version.outputs.VERSION, 'dev') }}
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 下载构建结果
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: 没有版本日志文件自动创建
        run: |
          version_first=$(echo $VERSION | cut -d'-' -f1)
          LOG_FILE="doc/changelog/$version_first.md"
          if [ ! -f "$LOG_FILE" ]; then
            touch "$LOG_FILE"
            echo "$VERSION" > "$LOG_FILE"
          fi
          echo "LOG_FILE=$LOG_FILE" >> "$GITHUB_ENV"

      - name: 创建release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: dist/*
          body_path: ${{ env.LOG_FILE }}
          prerelease: ${{ contains(env.VERSION, 'dev') || contains(env.VERSION, 'pre') || contains(env.VERSION, 'beta') }}
