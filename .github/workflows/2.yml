name: 构建龙芯

on:
  push:
    branches: [ 'main' ]
    paths: [ 'version.txt' ]
  workflow_dispatch:  # 🔥 手动触发配置
    inputs:
      architectures:
        description: '选择构建架构（可多选，逗号分隔）'
        required: true
        default: 'loong64,mips64le'
        type: string
      release:
        description: '是否发布到 Release'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      version_suffix:
        description: '版本后缀（可选，如手动测试可加 -test）'
        required: false
        default: ''
        type: string

env:
  APP_NAME: taoSync
  DOCKER_USER: dr34m
  DOCKER_NAME: tao-sync

jobs:
  get-version:
    name: 获取版本号
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.getVersion.outputs.VERSION }}
      ARCH_LIST: ${{ steps.setArch.outputs.ARCH_LIST }}
      DO_RELEASE: ${{ inputs.release == 'true' && !contains(steps.getVersion.outputs.VERSION, 'dev') }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - id: getVersion
        name: 获取基础版本号
        run: |
          cuVersion=$(head -n 1 version.txt | cut -d',' -f1)
          # 如果手动触发时指定了后缀，则追加到版本号
          suffix="${{ inputs.version_suffix }}"
          if [ -n "$suffix" ]; then
            echo "VERSION=${cuVersion}${suffix}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=$cuVersion" >> "$GITHUB_OUTPUT"
          fi

      - id: setArch
        name: 解析构建架构列表
        run: |
          # 手动触发时使用输入参数，否则使用默认值
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            archInput="${{ inputs.architectures }}"
          else
            archInput="loong64,mips64le"
          fi
          # 转换为 JSON 数组格式供 matrix 使用
          archJson=$(echo "$archInput" | tr ',' '\n' | jq -R . | jq -s .)
          echo "ARCH_LIST=$archJson" >> "$GITHUB_OUTPUT"

  build-frontend:
    name: 构建前端
    runs-on: ubuntu-latest
    needs: [ get-version ]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装Node.js 14.x
        uses: actions/setup-node@v4
        with:
          node-version: "14.x"

      - name: 安装依赖并构建前端
        run: |
          sed -i "s/__version_placeholder__/$VERSION/g" frontend/src/views/page/setting/index.vue
          cd frontend
          npm install
          npm run build

      - name: 上传artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  build-loongson:
    name: 构建龙芯可执行文件
    runs-on: ubuntu-latest
    needs: [ get-version, build-frontend ]
    if: ${{ needs.get-version.outputs.ARCH_LIST != '[]' }}
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
    strategy:
      matrix:
        arch: ${{ fromJson(needs.get-version.outputs.ARCH_LIST) }}

    steps:
      - name: 设置平台变量
        run: |
          arch=${{ matrix.arch }}
          if [ "$arch" = "loong64" ]; then
            echo "ARCH_NAME=loongson-newworld" >> $GITHUB_ENV
            echo "DEBIAN_ARCH=loongarch64" >> $GITHUB_ENV
          else
            echo "ARCH_NAME=loongson-oldworld" >> $GITHUB_ENV
            echo "DEBIAN_ARCH=mips64el" >> $GITHUB_ENV
          fi

      - name: 设置QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/${{ matrix.arch }}

      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 下载前端构建产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: 创建构建容器并执行打包
        run: |
          # 根据架构选择基础镜像
          if [ "${{ matrix.arch }}" = "loong64" ]; then
            BASE_IMAGE="loongson/ubuntu:22.04"
          else
            BASE_IMAGE="debian:bullseye"
          fi
          
          # 启动容器并执行构建（添加缓存加速）
          docker run --rm --platform linux/${{ matrix.arch }} \
            -v $(pwd):/workspace \
            -w /workspace \
            $BASE_IMAGE bash -c "
              apt-get update && apt-get install -y python3 python3-pip python3-venv build-essential
              python3 -m venv /opt/venv
              source /opt/venv/bin/activate
              pip install --upgrade pip
              pip install 'pyinstaller>=6,<7'
              pip install -r requirements.txt
              python3 -m PyInstaller ${{ env.APP_NAME }}.spec
              cd dist
              tar czf '${{ env.APP_NAME }}-${{ env.VERSION }}-${{ env.ARCH_NAME }}.tar.gz' *
            "

      - name: 上传龙芯构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ env.ARCH_NAME }}
          path: ${{ env.APP_NAME }}-${{ env.VERSION }}-${{ env.ARCH_NAME }}.tar.gz
          retention-days: 1

  create-release:
    name: 发布release
    runs-on: ubuntu-latest
    needs: [get-version, build-loongson]
    if: ${{ needs.get-version.outputs.DO_RELEASE == 'true' }}
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 下载构建结果
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: 没有版本日志文件自动创建
        run: |
          version_first=$(echo $VERSION | cut -d'-' -f1)
          LOG_FILE="doc/changelog/$version_first.md"
          if [ ! -f "$LOG_FILE" ]; then
            touch "$LOG_FILE"
            echo "$VERSION" > "$LOG_FILE"
          fi
          echo "LOG_FILE=$LOG_FILE" >> "$GITHUB_ENV"

      - name: 创建release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: dist/*
          body_path: ${{ env.LOG_FILE }}
          prerelease: ${{ contains(env.VERSION, 'dev') || contains(env.VERSION, 'pre') || contains(env.VERSION, 'beta') }}
          draft: true  # 🔥 手动发布时先创建为草稿，确认后再公开
